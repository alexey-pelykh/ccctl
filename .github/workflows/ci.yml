name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          # Caches the pnpm store, keyed on pnpm-lock.yaml (needs pnpm on PATH,
          # hence the pnpm/action-setup step above must run first).
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # The tmux session-launcher backend (#29) has integration tests that hand their
      # arguments to the REAL binary, because a fake `TmuxRunner` can only record the
      # argv we build — it cannot tell us what tmux DOES with it. Those tests found two
      # bugs a fully green faked suite passed over for four review rounds (tmux
      # format-expands `-c`, and it renumbers the window indices we teardown by). They
      # are `describe.skipIf(!TMUX_INSTALLED)`, so WITHOUT tmux on the runner they do not
      # fail here — they silently do not run, which is the worse outcome: the suite
      # reports green having never asked the only question those tests exist to ask.
      - name: Install tmux (the #29 launcher backend's integration tests need a real one)
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      # Formatting and eslint gate the PR as two orthogonal steps. `pnpm lint`
      # chains `format:check && …`, so a single stray formatting nit short-circuits
      # before eslint ever runs — that is exactly how five eslint errors sat
      # unnoticed on `main`. `lint:code` is the eslint half on its own, and
      # `!cancelled()` lets each step report even when an earlier one already
      # failed, so one push surfaces every verdict instead of the first.
      - name: Format check
        if: ${{ !cancelled() }}
        run: pnpm run format:check

      - name: Lint
        if: ${{ !cancelled() }}
        run: pnpm run lint:code

  # End-to-end gate, wired after typecheck + unit tests (`needs: test`). The
  # packages/e2e suite runs the hermetic, loopback-only inference-untouched
  # skeleton (no live worker or credentials) alongside the remaining
  # `describe.todo` placeholders. The credentialed specs — which drive a patched
  # worker and reach api.anthropic.com — land in a later wave and will gate on
  # their own env (turbo passes CCCTL_E2E / CCCTL_SDK_URL / ANTHROPIC_API_KEY
  # through to the `test:e2e` task).
  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          # Same key as `test`; this job `needs: test`, so that cache is already
          # saved and we exact-hit it (and therefore skip re-saving — no collision).
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: End-to-end tests
        run: pnpm run test:e2e
