<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- PWA install (#51): the web app manifest makes the UI installable; theme-color tints the OS
         chrome; the apple-* metas give iOS its standalone launch + home-screen title + icon (iOS
         reads these rather than only the manifest). The service worker is registered from app.js.
         Paths are relative so the app installs correctly however it is statically served. -->
    <meta name="theme-color" content="#1d4ed8" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ccctl" />
    <title>ccctl</title>
    <style>
      /* Minimal legibility only — zero-build, no framework and no bundler. */
      *,
      *::before,
      *::after {
        /* Padding + borders count INSIDE a declared width, so a full-width control
           (e.g. #session-list button { width: 100% }) can't overflow its row (#83, AC3). */
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        margin: 1rem;
        line-height: 1.4;
        /* Long unbreakable tokens (session UUIDs, cwd paths) wrap instead of forcing a
           horizontal scroll at any width (#83, AC3). */
        overflow-wrap: break-word;
      }
      #status {
        color: #666;
      }
      /* Always-visible connection-health indicator for the phone↔server transport (#75): a small
         pill whose colour tracks the live / reconnecting / offline state. The hues reuse the page's
         status language — running-green and requires_action/degraded-amber — plus a red for offline. */
      #connection {
        display: inline-block;
        padding: 0.05rem 0.4rem;
        font-size: 0.8rem;
        font-weight: 600;
        border: 1px solid transparent;
        border-radius: 0.25rem;
      }
      #connection[data-connection="live"] {
        color: #047857;
        background: #d1fae5;
        border-color: #10b981;
      }
      #connection[data-connection="reconnecting"] {
        color: #b45309;
        background: #fef3c7;
        border-color: #f59e0b;
      }
      #connection[data-connection="offline"] {
        color: #b91c1c;
        background: #fee2e2;
        border-color: #ef4444;
      }
      #activity {
        margin: 0.5rem 0;
        font-weight: 600;
      }
      #activity[data-status="running"] {
        color: #047857;
      }
      #activity[data-status="requires_action"] {
        color: #b45309;
      }
      #session-list {
        list-style: none;
        padding: 0;
      }
      #session-list li {
        padding: 0.25rem 0;
      }
      #session-list button {
        width: 100%;
        text-align: left;
        cursor: pointer;
        padding: 0.4rem 0.6rem;
      }
      /* The session currently viewed + steered. */
      #session-list li[data-selected="true"] button {
        font-weight: 700;
        border-color: #1d4ed8;
      }
      /* A non-prompting session's notifications-degraded badge (#26/#27); amber, the same
         attention hue as the requires_action activity. The full-width row button pushes it
         onto its own line; the left margin matches the button's own text inset. */
      #session-list [data-badge="notifications-degraded"] {
        display: inline-block;
        margin: 0.2rem 0 0 0.6rem;
        padding: 0.05rem 0.4rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: #b45309;
        background: #fef3c7;
        border: 1px solid #f59e0b;
        border-radius: 0.25rem;
      }
      /* A session with an un-acked reconciled "needs-you" event (#53). Red — the page's attention hue
         (as offline / error) — a STRONGER signal than the amber degraded marker: this is an active
         call to view the session, not a standing property. Same sibling-of-the-button layout so it
         survives a poll's relabel; it clears when the operator views the session (which acks it). */
      #session-list [data-badge="needs-you"] {
        display: inline-block;
        margin: 0.2rem 0 0 0.6rem;
        padding: 0.05rem 0.4rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: #b91c1c;
        background: #fee2e2;
        border: 1px solid #ef4444;
        border-radius: 0.25rem;
      }
      /* The "New session" launch control (#37). Unlike the single-input steer rows below, this form
         carries three fields plus its submit, so it STACKS rather than sharing one flex row — three
         inputs abreast are unusable on the phone this UI is driven from. */
      .launch-form {
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      /* The launch outcome, in the page's existing status hues: grey while in flight (as #status),
         running-green on an accepted launch, red on a failure (as a failed device list). */
      #launch-status[data-launch="launching"] {
        color: #666;
      }
      #launch-status[data-launch="launched"] {
        color: #047857;
      }
      #launch-status[data-launch="failed"] {
        color: #b91c1c;
      }
      /* The TYPED failure code (#33) as a chip ahead of the server's sentence, so WHICH failure it
         is reads at a glance (#37 AC3) instead of having to be pattern-matched out of the prose. */
      #launch-status [data-launch-code] {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        padding: 0.05rem 0.4rem;
        border: 1px solid currentColor;
        border-radius: 0.25rem;
      }
      /* The operator's paired-device list (#85). Each row is one device; the current device
         is called out in running-green (the page's "this is live / yours" hue) and bold. */
      #device-list {
        list-style: none;
        padding: 0;
      }
      #device-list li {
        padding: 0.25rem 0;
        border-bottom: 1px solid #eee;
      }
      /* The per-device Revoke control (#81, AC3): a small inline action trailing each row. */
      #device-list li button[data-revoke="true"] {
        margin-left: 0.5rem;
        font-size: 0.85em;
      }
      #device-list li[data-current="true"] {
        font-weight: 700;
        color: #047857;
      }
      /* A failed device list (e.g. before the server wires GET /api/devices): an inline red row. */
      #device-list li[data-error="true"] {
        color: #b91c1c;
      }
      #events {
        list-style: none;
        padding: 0;
      }
      #events li {
        padding: 0.25rem 0;
        border-bottom: 1px solid #eee;
      }
      #events li[data-unparsed] {
        color: #999;
        font-style: italic;
      }
      /* A steer we sent, echoed back so it reads as ours, not the worker's. */
      #events li[data-outbound] {
        color: #1d4ed8;
      }
      /* The emergency stop (#77). Red — the page's existing "this is bad news" hue (an offline
         connection, a failed launch) — and, unlike every other control here, OUTLINED rather than
         plain: it is the one button that destroys what it touches, so it must not read as another
         steer. Disabled until a session is selected, since a stop is never inferred (#20). */
      #stop-button {
        cursor: pointer;
        padding: 0.4rem 0.8rem;
        font-weight: 600;
        color: #b91c1c;
        background: #fff;
        border: 1px solid #ef4444;
        border-radius: 0.25rem;
      }
      #stop-button:disabled {
        cursor: not-allowed;
        color: #999;
        border-color: #ddd;
      }
      /* The force escalation, offered ONLY after the server refuses `taken-over` — someone is
         driving that session at a terminal. Filled rather than outlined: it is the more destructive
         of the two, and it should not look like the button the operator just pressed. */
      #stop-force-button {
        margin-left: 0.5rem;
        cursor: pointer;
        padding: 0.1rem 0.5rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: #fff;
        background: #b91c1c;
        border: 1px solid #b91c1c;
        border-radius: 0.25rem;
      }
      /* The stop outcome, in the page's existing status hues: grey while in flight (as #status),
         red on a refusal or failure, and neutral-grey on success — a stopped session is not a
         green "all good", it is a thing that is now over. */
      #stop-status[data-stop="stopping"] {
        color: #666;
      }
      #stop-status[data-stop="stopped"] {
        color: #333;
        font-weight: 600;
      }
      #stop-status[data-stop="failed"] {
        color: #b91c1c;
      }
      /* The TYPED refusal code (#76) as a chip ahead of the server's sentence — the same treatment
         the launch status gives its own code, so WHICH refusal it is reads at a glance. */
      #stop-status [data-stop-code] {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        padding: 0.05rem 0.4rem;
        border: 1px solid currentColor;
        border-radius: 0.25rem;
      }
      .steer-form {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
      }
      .steer-form input {
        flex: 1;
      }
      .steer-actions {
        margin-top: 1rem;
      }
      /* The optimistic offline-steer queue (#79): each row is a steer the operator submitted while the
         connection was offline, held to fire in order on reconnect. Amber — the page's "in-flight /
         attention" hue (as the reconnecting indicator and the degraded badge) — because it is a decision
         waiting on the link. A row the stale-guard held (W5-21 / #80: the session moved on) turns red,
         the stronger attention hue, and carries a "Send anyway" (the "still send?" confirm) beside Cancel. */
      #steer-queue {
        list-style: none;
        padding: 0;
      }
      #steer-queue li {
        padding: 0.25rem 0;
        border-bottom: 1px solid #eee;
      }
      #steer-queue li[data-queued="pending"] {
        color: #b45309;
      }
      #steer-queue li[data-queued="stale"] {
        color: #b91c1c;
      }
      /* The target session a queued steer fires against — muted, since it is provenance, not the steer's
         content (the bold verb + summary ahead of it are). The "moved on" note (#80) is the same muted
         provenance, saying WHY a stale row is held. */
      #steer-queue [data-queue-target],
      #steer-queue [data-queue-stale-note] {
        color: #666;
        font-size: 0.85rem;
      }
      #steer-queue [data-queue-cancel],
      #steer-queue [data-queue-send] {
        margin-left: 0.5rem;
        cursor: pointer;
        padding: 0.05rem 0.4rem;
        font-size: 0.8rem;
      }
      /* The push-notification enablement outcome (#51), in the page's existing status hues: grey while
         requesting/subscribing, running-green once this device is subscribed, amber when the browser /
         OS blocks or has not granted permission, red on an outright failure. */
      #push-status[data-push="working"] {
        color: #666;
      }
      #push-status[data-push="enabled"] {
        color: #047857;
      }
      #push-status[data-push="blocked"] {
        color: #b45309;
      }
      #push-status[data-push="failed"] {
        color: #b91c1c;
      }
      /* Comfortable touch targets on the phone — the primary surface (#83, AC2). 44px
         (2.75rem) is the long-standing minimum tap size; applied to the primary controls. The
         compact inline secondary actions below keep a smaller-but-still-tappable minimum. */
      #session-list button,
      #refresh-sessions,
      #refresh-devices,
      .launch-form input,
      #launch-button,
      .steer-form input,
      .steer-form button,
      #approve-button,
      #stop-button,
      #enable-push {
        min-height: 2.75rem;
      }
      #stop-force-button,
      #device-list li button[data-revoke="true"],
      #steer-queue [data-queue-cancel],
      #steer-queue [data-queue-send] {
        min-height: 2rem;
      }
      /* Wide viewports — tablet and up (#83, AC1/AC4). The phone (base styles above) is the
         primary surface and stays a single column; from 48rem the UI uses the extra width
         rather than only stretching that column: the session picker (`.pane-nav`) sits BESIDE
         the selected session's transcript + steer controls (`.pane-detail`), and the page is
         width-capped + centred so line lengths stay readable on a laptop. Device management
         (`.pane-manage`) spans full width below. A desktop-class tablet (touch + keyboard/mouse,
         landscape) is exactly this two-pane layout; the steer controls run on click + form
         submit, which fire from touch, pointer and keyboard alike (unchanged). `minmax(0, 1fr)`
         lets the transcript column shrink so long content wraps rather than overflowing. */
      @media (min-width: 48rem) {
        main {
          max-width: 75rem;
          margin-inline: auto;
        }
        .workspace {
          display: grid;
          grid-template-columns: minmax(15rem, 20rem) minmax(0, 1fr);
          gap: 1.5rem;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ccctl</h1>
      <p>Steer Claude Code from anywhere. Control channel only — inference stays on Anthropic.</p>
      <!-- Always-visible connection-health of the phone↔server transport (#75): live /
           reconnecting / offline, driven by the poll (fetch) heartbeat and the SSE stream —
           distinct from any one session's status below. `aria-atomic` re-announces the whole
           "Connection: <state>" line (not the bare state word) each time the state changes. -->
      <p id="connection-line" aria-live="polite" aria-atomic="true">
        Connection: <span id="connection" data-connection="reconnecting">reconnecting</span>
      </p>
      <!-- RESPONSIVE WORKSPACE (#83): a single column on the phone (the primary surface), and from
           48rem a two-pane grid — the session picker (`.pane-nav`) BESIDE the selected session's
           transcript + steer controls (`.pane-detail`). The DOM order is phone-first, so the
           single-column stack reads sessions → new session → the selected session's detail exactly
           as before; the grid only rearranges it sideways at width. Device management
           (`.pane-manage`) sits full-width below. All layout is CSS — `app.js` binds by id, so the
           wrappers change nothing it reads. -->
      <div class="workspace">
        <div class="pane-nav">
          <!-- The sessions the daemon is carrying (#20). Pick one to view + steer it; each is
               independent — the transcript, activity, and steer below apply to the SELECTED session. -->
          <section id="sessions">
            <h2>Sessions <button id="refresh-sessions" type="button">Refresh</button></h2>
            <ul id="session-list" aria-live="polite"></ul>
          </section>
          <!-- The "New session" control (#37, UC2): launch a fresh session on the operator's host via
           `POST /api/sessions` (#31). The working directory is the one REQUIRED field — `required`
           lets the browser block a blank submit natively, and `launch.js` refuses one anyway; the
           project and initial prompt are optional. The launched session is `registering` from birth
           (#33), so it lands in the picker above on the refresh an accepted launch triggers. The
           outcome — the minted id + attach hint, or a TYPED failure code + the server's actionable
           sentence — lands in the `aria-live` status line below the form. -->
          <section id="new-session">
            <h2>New session</h2>
            <form id="launch-form" class="launch-form">
              <input
                id="launch-cwd"
                name="cwd"
                type="text"
                autocomplete="off"
                required
                placeholder="Working directory (required, e.g. /home/alex/code/app)"
              />
              <input
                id="launch-project"
                name="project"
                type="text"
                autocomplete="off"
                placeholder="Project (optional)"
              />
              <input
                id="launch-prompt"
                name="initialPrompt"
                type="text"
                autocomplete="off"
                placeholder="Initial prompt (optional)"
              />
              <button id="launch-button" type="submit">New session</button>
            </form>
            <p id="launch-status" aria-live="polite" hidden></p>
          </section>
        </div>
        <div class="pane-detail">
          <!-- Transport lifecycle of the SSE connection to the selected session. -->
          <section id="status" aria-live="polite">no session selected</section>
          <!-- The session's current turn (worker_status); revealed on the first frame. -->
          <section id="activity" aria-live="polite" hidden></section>
          <h2>Transcript</h2>
          <ul id="events" aria-live="polite"></ul>
          <!-- Upstream steer controls (#16): input / redirect / approve. Each POSTs a
           control_request to the server, which relays it to the worker channel. -->
          <form id="prompt-form" class="steer-form">
            <input id="prompt-input" name="prompt" type="text" autocomplete="off" placeholder="Send to session…" />
            <button type="submit">Send</button>
          </form>
          <form id="redirect-form" class="steer-form">
            <input
              id="redirect-input"
              name="redirect"
              type="text"
              autocomplete="off"
              placeholder="Redirect the current turn…"
            />
            <button type="submit">Redirect</button>
          </form>
          <div class="steer-actions">
            <button id="approve-button" type="button">Approve</button>
          </div>
          <!-- OPTIMISTIC OFFLINE-STEER QUEUE (#79, UI-B-011) + STALE-GUARD (#80, W5-21 / SRV-B-015+UI-B-011):
           a steer the operator submits while the connection is offline (the #75 indicator above reads
           "offline") is held here — visibly pending — and fired in order on the next reconnect, so a
           brief tunnel drop does not lose a decision. At fire time each item is routed through the
           stale-guard: one whose session has MOVED ON since the operator last looked (its message cursor
           advanced past the viewed one) is held red with a "Send anyway"/Cancel confirm rather than fired
           blind (#80). An ONLINE steer against a moved-on session lands here the same way. The section
           stays hidden until something is queued. `src/steer-queue.js` owns the pure queue + guard
           decisions, `app.js` is the thin shell around them. -->
          <section id="steer-queue-section" hidden>
            <h2>Queued steering</h2>
            <ul id="steer-queue" aria-live="polite"></ul>
          </section>
          <!-- EMERGENCY STOP (#77, UI-B-012): kill the SELECTED session's terminal outright via
           `POST /api/sessions/{id}/stop` (#76). Deliberately its own section rather than a fourth
           `.steer-actions` button: a stop is not a steer — the three above ASK the worker to do
           something and need it listening, this kills the surface the worker RUNS ON — and it is the
           one control here that destroys what it touches, so it reads as its own thing rather than
           sitting a thumb's width from "Approve".
           It addresses the SELECTED session (the one whose transcript and activity are on screen —
           what the operator should see before killing it) rather than carrying a per-row button in
           the picker: that list re-polls every 2s and can reorder, so a destructive button there
           could shift under a thumb between sight and tap, and killing a session nobody named is
           exactly what #20 exists to prevent. The button names its target for the same reason.
           The outcome — how it ended plus the terminal state it reached, or a TYPED refusal code and
           the server's actionable sentence — lands in the `aria-live` status line. On a `taken-over`
           refusal ONLY, an escalation appears there: force is never a standing control. -->
          <section id="stop-session">
            <h2>Stop session</h2>
            <button id="stop-button" type="button" disabled>Stop session</button>
            <p id="stop-status" aria-live="polite" hidden></p>
          </section>
        </div>
      </div>
      <div class="pane-manage">
        <!-- ENABLE NOTIFICATIONS (#51, UI-C-002): subscribe THIS device to Web-Push (VAPID) so the
           operator is woken by a visible notification when a session blocks on them while the app is
           backgrounded / closed. The button requests notification permission, fetches the server's
           VAPID public key, subscribes via the PushManager, and uploads the subscription — the exact
           shape the server's wake dispatch (#50) sends to. `userVisibleOnly` is always set and the
           service worker always renders a notification, so there is NO silent push (which iOS would
           punish by revoking the subscription). The outcome — subscribed, blocked by the browser / OS,
           or unavailable until the server wires the push routes (this surface runs ahead of that, as
           the QR-pair token #74 and device list #85 do) — lands in the `aria-live` status line.
           `src/push.js` owns the pure decisions; this is the control they hang off. -->
        <section id="notifications">
          <h2>Notifications</h2>
          <button id="enable-push" type="button">Enable notifications</button>
          <p id="push-status" aria-live="polite" hidden></p>
        </section>
        <!-- The operator's PAIRED DEVICES (#85): a management surface listing each paired device
           (phone / tablet / laptop) by name + last-seen (AC1), with the current device clearly
           marked (AC2). Each row is keyed by device id — the entry point a per-device revoke
           (W6-19, AC3) will hang off. Fetched from `GET /api/devices` on load + manual Refresh;
           the route and its server-set `current` marker land with the credentialed wave (#84 built
           the device store; the server-side token verification that computes `current` is deferred).
           Not `aria-live`: it refreshes only on explicit user action, so — unlike the auto-polled
           session list — it needn't re-announce the whole list each time. -->
        <section id="devices">
          <h2>Devices <button id="refresh-devices" type="button">Refresh</button></h2>
          <ul id="device-list"></ul>
        </section>
      </div>
    </main>
    <!-- Zero-build: plain ES modules, no framework and no bundler. -->
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
