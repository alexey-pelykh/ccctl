<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ccctl</title>
    <style>
      /* Minimal legibility only — zero-build, no framework and no bundler. */
      body {
        font-family: system-ui, sans-serif;
        margin: 1rem;
        line-height: 1.4;
      }
      #status {
        color: #666;
      }
      #activity {
        margin: 0.5rem 0;
        font-weight: 600;
      }
      #activity[data-status="running"] {
        color: #047857;
      }
      #activity[data-status="requires_action"] {
        color: #b45309;
      }
      #events {
        list-style: none;
        padding: 0;
      }
      #events li {
        padding: 0.25rem 0;
        border-bottom: 1px solid #eee;
      }
      #events li[data-unparsed] {
        color: #999;
        font-style: italic;
      }
      /* A steer we sent, echoed back so it reads as ours, not the worker's. */
      #events li[data-outbound] {
        color: #1d4ed8;
      }
      .steer-form {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
      }
      .steer-form input {
        flex: 1;
      }
      .steer-actions {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ccctl</h1>
      <p>Steer Claude Code from anywhere. Control channel only — inference stays on Anthropic.</p>
      <!-- Transport lifecycle of the SSE connection. -->
      <section id="status" aria-live="polite">connecting…</section>
      <!-- The session's current turn (worker_status); revealed on the first frame. -->
      <section id="activity" aria-live="polite" hidden></section>
      <h2>Transcript</h2>
      <ul id="events" aria-live="polite"></ul>
      <!-- Upstream steer controls (#16): input / redirect / approve. Each POSTs a
           control_request to the server, which relays it to the worker channel. -->
      <form id="prompt-form" class="steer-form">
        <input id="prompt-input" name="prompt" type="text" autocomplete="off" placeholder="Send to session…" />
        <button type="submit">Send</button>
      </form>
      <form id="redirect-form" class="steer-form">
        <input
          id="redirect-input"
          name="redirect"
          type="text"
          autocomplete="off"
          placeholder="Redirect the current turn…"
        />
        <button type="submit">Redirect</button>
      </form>
      <div class="steer-actions">
        <button id="approve-button" type="button">Approve</button>
      </div>
    </main>
    <!-- Zero-build: plain ES modules, no framework and no bundler. -->
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
