packages:
  - "packages/*"

# pnpm 11 only reads auth/registry settings from .npmrc; everything else lives here.
engineStrict: true
autoInstallPeers: true
linkWorkspacePackages: true
allowBuilds:
  esbuild: true
  # node-pty (#30, the owned-pty launcher fallback) is a native module whose build is NOT allowed
  # here. CI + typecheck need only its shipped `.d.ts`, and the backend's unit tests drive an
  # injected fake spawner, so nothing in the default lane loads the native binding.
  #
  # WHY this is `false`, why a default checkout cannot spawn a pty on EITHER platform, and which
  # lever each platform actually needs: packages/e2e/src/pty-handle-residual.ts, module doc §
  # "Fenced / opt-in, on its OWN arm" — the ONE canonical account. Don't restate it here (#235: the
  # duplication is the defect generator; packages/e2e/src/pty-chain-census.ts fails the build if you
  # do). To arm a box, don't hand-apply anything from memory — run the preflight, which probes:
  #   pnpm --filter @ccctl/e2e arm:pty
  node-pty: false
